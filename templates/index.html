<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Big-O Complexity Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/4.4.4/chart.umd.min.js"></script>
<style>
    :root {
        --bg: #0f172a;
        --panel: #1e293b;
        --text: #e2e8f0;
        --accent: #38bdf8;
        --muted: #94a3b8;
        --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 20px;
    }
    h1 {
        font-size: 1.8rem;
        margin-bottom: 4px;
    }
    p.subtitle {
        color: var(--muted);
        margin-top: 0;
        margin-bottom: 24px;
    }
    .container {
        width: 100%;
        max-width: 1000px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
    }
    .controls label {
        font-weight: 600;
        margin-right: 8px;
    }
    .controls input[type="range"] {
        width: 280px;
        accent-color: var(--accent);
    }
    .controls input[type="number"] {
        width: 90px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #0f172a;
        color: var(--text);
    }
    #nValue {
        font-weight: 700;
        color: var(--accent);
        min-width: 60px;
        display: inline-block;
    }
    .legend-toggles {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
    }
    .legend-toggles label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.9rem;
        cursor: pointer;
        color: var(--muted);
    }
    .legend-toggles input { cursor: pointer; }
    canvas {
        max-height: 480px;
    }
    .scale-toggle {
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .scale-toggle button {
        background: #0f172a;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
    }
    .scale-toggle button.active {
        background: var(--accent);
        color: #0f172a;
        border-color: var(--accent);
    }
    .values-table {
        margin-top: 24px;
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
    }
    .values-table th, .values-table td {
        border: 1px solid var(--border);
        padding: 8px 12px;
        text-align: right;
    }
    .values-table th {
        background: #0f172a;
        color: var(--accent);
    }
    .values-table td:first-child, .values-table th:first-child {
        text-align: left;
    }
    footer {
        margin-top: 20px;
        color: var(--muted);
        font-size: 0.8rem;
    }
</style>
</head>
<body>

<h1>Big-O Complexity Visualizer</h1>
<p class="subtitle">Compare growth rates of common time complexities as <em>n</em> changes</p>

<div class="container">
    <div class="controls">
        <div>
            <label for="nSlider">n =</label>
            <input type="range" id="nSlider" min="1" max="200" value="20" step="1">
            <span id="nValue">20</span>
        </div>
        <div>
            <label for="nInput">Set exact:</label>
            <input type="number" id="nInput" min="1" max="1000000" value="20">
        </div>
        <div class="scale-toggle">
            <label>Y scale:</label>
            <button id="linearBtn" class="active">Linear</button>
            <button id="logBtn">Log</button>
        </div>
    </div>

    <div class="legend-toggles" id="seriesToggles"></div>

    <canvas id="chart"></canvas>

    <table class="values-table" id="valuesTable">
        <thead>
            <tr><th>Complexity</th><th id="valueAtNHeader">Value at n</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<footer>Flask + Chart.js • O(1), O(log n), O(n), O(n log n), O(n&sup2;)</footer>

<script>
const seriesConfig = {
    "O(1)":        { color: "#38bdf8" },
    "O(log n)":    { color: "#34d399" },
    "O(n)":        { color: "#fbbf24" },
    "O(n log n)":  { color: "#f472b6" },
    "O(n^2)":      { color: "#f87171" },
};

let chart;
let currentScale = "linear";

function buildToggles() {
    const container = document.getElementById("seriesToggles");
    Object.entries(seriesConfig).forEach(([name, cfg]) => {
        const label = document.createElement("label");
        label.style.color = cfg.color;
        label.innerHTML = `<input type="checkbox" checked data-series="${name}"> ${name.replace('^2','²')}`;
        container.appendChild(label);
    });
    container.querySelectorAll("input[type=checkbox]").forEach(cb => {
        cb.addEventListener("change", () => {
            const idx = chart.data.datasets.findIndex(d => d.label === cb.dataset.series);
            if (idx !== -1) {
                chart.setDatasetVisibility(idx, cb.checked);
                chart.update();
            }
        });
    });
}

async function fetchData(n) {
    const res = await fetch(`/api/complexity?n=${n}`);
    return res.json();
}

function renderTable(data, n) {
    const tbody = document.querySelector("#valuesTable tbody");
    tbody.innerHTML = "";
    document.getElementById("valueAtNHeader").textContent = `Value at n = ${n}`;
    Object.entries(seriesConfig).forEach(([name]) => {
        const arr = data[name];
        const val = arr[arr.length - 1];
        const display = name === "O(1)" ? "1" : (Number.isInteger(val) ? val : val.toFixed(2));
        const tr = document.createElement("tr");
        tr.innerHTML = `<td style="color:${seriesConfig[name].color}">${name.replace('^2','²')}</td><td>${display}</td>`;
        tbody.appendChild(tr);
    });
}

async function updateChart(n) {
    const data = await fetchData(n);
    const labels = data.n;

    if (!chart) {
        const ctx = document.getElementById("chart").getContext("2d");
        chart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: Object.entries(seriesConfig).map(([name, cfg]) => ({
                    label: name,
                    data: data[name],
                    borderColor: cfg.color,
                    backgroundColor: cfg.color,
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.15,
                }))
            },
            options: {
                responsive: true,
                animation: { duration: 250 },
                interaction: { mode: "index", intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => `${ctx.dataset.label}: ${Number(ctx.parsed.y).toFixed(2)}`
                        }
                    }
                },
                scales: {
                    x: { title: { display: true, text: "n", color: "#94a3b8" }, ticks: { color: "#94a3b8" }, grid: { color: "#334155" } },
                    y: {
                        type: currentScale,
                        title: { display: true, text: "Operations", color: "#94a3b8" },
                        ticks: { color: "#94a3b8" },
                        grid: { color: "#334155" }
                    }
                }
            }
        });
    } else {
        chart.data.labels = labels;
        chart.data.datasets.forEach(ds => { ds.data = data[ds.label]; });
        chart.options.scales.y.type = currentScale;
        chart.update();
    }
    renderTable(data, n);
}

const slider = document.getElementById("nSlider");
const numberInput = document.getElementById("nInput");
const nValueLabel = document.getElementById("nValue");

function setN(n) {
    n = Math.max(1, Math.min(1000000, n));
    nValueLabel.textContent = n;
    if (n <= slider.max) slider.value = n;
    numberInput.value = n;
    updateChart(n);
}

slider.addEventListener("input", () => setN(parseInt(slider.value)));
numberInput.addEventListener("change", () => setN(parseInt(numberInput.value) || 1));

document.getElementById("linearBtn").addEventListener("click", (e) => {
    currentScale = "linear";
    e.target.classList.add("active");
    document.getElementById("logBtn").classList.remove("active");
    updateChart(parseInt(numberInput.value));
});
document.getElementById("logBtn").addEventListener("click", (e) => {
    currentScale = "logarithmic";
    e.target.classList.add("active");
    document.getElementById("linearBtn").classList.remove("active");
    updateChart(parseInt(numberInput.value));
});

buildToggles();
setN(20);
</script>
</body>
</html>
